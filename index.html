<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atiqul Bari</title>
    <link rel="stylesheet" href="./styles/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Poppins:wght@400;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
      integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="main-content">
    <header class="container header active sec-1" id="home">
      <i class="fa-brands fa-facebook-f"></i>
    </header>
    <main>
      <section class="container about sec-2" id="about"></section>
      <section class="container about sec-3" id="portfolio"></section>
      <section class="container about sec-4" id="blogs"></section>
      <section class="container about sec-5" id="contact"></section>
    </main>

    <div class="controls">
      <div class="control active-btn" data-id="home">
        <i class="fa-solid fa-house"></i>
      </div>
      <div class="control" data-id="home">
        <i class="fa-solid fa-user"></i>
      </div>
      <div class="control" data-id="home">
        <i class="fa-solid fa-briefcase"></i>
      </div>
      <div class="control" data-id="home">
        <i class="fa-solid fa-newspaper"></i>
      </div>
      <div class="control" data-id="home">
        <i class="fa-solid fa-envelope-open"></i>
      </div>
    </div>
    <script src="./src/app.js"></script>
  </body>
</html>
